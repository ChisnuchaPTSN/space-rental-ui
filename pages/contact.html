<section class="contact-hero">
        <h1>Contact</h1>
    </section>

    <section class="contact-section">
        <div class="contact-container">

            <div class="contact-header">
                <h2>พร้อมให้คำปรึกษา</h2>
                <p>ทีมงานของเราพร้อมให้บริการและตอบคำถามทุกข้อสงสัย ติดต่อเราได้ทุกช่องทาง</p>
            </div>

            <div class="contact-grid">

                <!-- LEFT : FORM -->
                <div class="contact-form">
                    <h3>ส่งข้อความถึงเรา</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label>ชื่อ-นามสกุล <span>*</span></label>
                            <input type="text" placeholder="กรอกชื่อของคุณ">
                        </div>

                        <div class="form-group">
                            <label>อีเมล <span>*</span></label>
                            <input type="email" placeholder="กรอกอีเมลของคุณ">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>โทรศัพท์ <span>*</span></label>
                            <input type="text" placeholder="กรอกโทรศัพท์">
                        </div>

                        <div class="form-group">
                            <label>หัวข้อ <span>*</span></label>
                            <select>
                                <option>เลือกหัวข้อ</option>
                                <option>สอบถามข้อมูล</option>
                                <option>แจ้งปัญหา</option>
                                <option>ติดต่อฝ่ายขาย</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>ข้อความ <span>*</span></label>
                        <textarea placeholder="กรอกข้อความหรือคำถามของคุณ..."></textarea>
                    </div>

                    <button class="submit-btn"><i class="fa-regular fa-paper-plane"></i>ส่งข้อความ</button>

                    <p class="form-note"><i class="fa-regular fa-message"></i>เราจะติดต่อกลับภายใน 24 ชั่วโมง</p>
                </div>

                <!-- RIGHT : INFO -->
                <div class="contact-info">
                    <h3>ช่องทางการติดต่อ</h3>

                    <div class="info-item">
                        <i class="fa-solid fa-phone"></i>
                        <div>
                            <strong>โทรศัพท์</strong>
                            <p>02-123-4567</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <i class="fa-solid fa-envelope"></i>
                        <div>
                            <strong>อีเมล</strong>
                            <p>info@spacerental.com</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <i class="fa-solid fa-location-dot"></i>
                        <div>
                            <strong>สำนักงานใหญ่</strong>
                            <p>123 ถนนสมมติ แขวงคลองเตย เขตวัฒนา กรุงเทพฯ 10110</p>
                        </div>
                    </div>

                    <div class="social">
                        <strong>Social Media</strong>
                        <div class="social-icons">
                            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                            <a href="#"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                        </div>
                    </div>

                    <div class="map">
                        <iframe src="https://maps.google.com/maps?q=Bangkok&t=&z=13&ie=UTF8&iwloc=&output=embed"
                            loading="lazy">
                        </iframe>
                    </div>
                </div>


            </div>
        </div>
    </section>
